<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; overflow: hidden; }
  body::before, body::after { display: none; }
  .stage {
    position: relative; width: 100%; height: 100%;
    background: #070710; padding: 24px 28px;
    overflow: hidden;
  }
  .stage::before {
    content: ''; position: absolute;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(80,110,255,0.45) 0%, transparent 68%);
    top: -200px; right: -120px;
  }
  .stage::after {
    content: ''; position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(160,90,255,0.35) 0%, transparent 65%);
    bottom: -180px; left: -120px;
  }
  .legend {
    position: relative; z-index: 2;
    color: var(--color-fg-1); font-family: var(--font-mono); font-size: 11px;
    line-height: 1.7;
  }
  .legend strong { color: var(--color-fg-1); font-weight: 500; }
  .legend span { color: var(--color-fg-2); }
</style></head>
<body>
  <div class="stage">
    <div class="legend">
      <strong>orb-blue</strong> · top-right · 600×600 · <span>rgba(80,110,255,.15)→transparent</span><br/>
      <strong>orb-violet</strong> · bottom-left · 500×500 · <span>rgba(160,90,255,.11)→transparent</span><br/>
      <span style="color: var(--color-fg-3);">fixed to viewport · the only color in the page chrome</span>
    </div>
  </div>
</body></html>
