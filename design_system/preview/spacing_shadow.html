<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; padding: 14px 8px; }
  .stack-s { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card {
    width: 220px; height: 110px;
    background: rgba(22,22,35,0.62);
    border: 1px solid var(--color-border);
    backdrop-filter: blur(24px);
    border-radius: 18px;
  }
  .card-rest { box-shadow: 0 8px 32px rgba(0,0,0,0.55); }
  .card-hover {
    box-shadow: 0 16px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.20);
  }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-1); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); text-align: center; line-height: 1.6; }
</style></head>
<body><div class="wrap">
  <div class="row2">
    <div class="stack-s">
      <div class="card card-rest"></div>
      <span class="label">shadow-card</span>
      <span class="val">0 8px 32px<br/>rgba(0,0,0,.55)</span>
    </div>
    <div class="stack-s">
      <div class="card card-hover"></div>
      <span class="label">shadow-card-hover</span>
      <span class="val">0 16px 48px rgba(0,0,0,.65)<br/>+ inset 1px ring</span>
    </div>
  </div>
</div></body></html>
