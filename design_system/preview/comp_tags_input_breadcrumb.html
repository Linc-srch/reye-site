<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .pane { margin-bottom: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); margin-bottom: 8px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    background: rgba(110, 158, 255, 0.13);
    border: 1px solid rgba(110, 158, 255, 0.28);
    padding: 3px 10px; border-radius: 999px;
    font-size: 12px; color: var(--color-accent);
  }
  .tag.id { font-family: var(--font-mono); }
  .input-wrap {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--color-fg-2);
    font-family: var(--font-sans);
    font-size: 14px;
  }
  .breadcrumb { font-size: 0.82rem; color: var(--color-fg-2); }
  .breadcrumb a { color: var(--color-fg-2); text-decoration: none; }
  .breadcrumb a:hover { color: var(--color-fg-1); }
  .breadcrumb span { margin: 0 0.4rem; }
</style></head>
<body><div class="wrap">
  <div class="pane">
    <div class="lbl">tag pills · keyword</div>
    <div class="tags">
      <span class="tag">large language models</span>
      <span class="tag">post-quantum cryptography</span>
      <span class="tag">digital identity</span>
      <span class="tag">3GPP</span>
    </div>
  </div>
  <div class="pane">
    <div class="lbl">tag pills · arxiv id</div>
    <div class="tags">
      <span class="tag id">2605.18753</span>
      <span class="tag id">2605.14922</span>
    </div>
  </div>
  <div class="pane">
    <div class="lbl">search input</div>
    <div class="input-wrap">Search titles, summaries, tags…</div>
  </div>
  <div class="pane">
    <div class="lbl">breadcrumb</div>
    <div class="breadcrumb">
      <a href="#">Home</a><span>›</span><span style="color: var(--color-fg-1);">Analysis</span>
    </div>
  </div>
</div></body></html>
