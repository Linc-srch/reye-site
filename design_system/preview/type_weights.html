<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row-w { display: grid; grid-template-columns: 110px 1fr; gap: 14px; align-items: baseline; padding: 6px 0; }
  .tk { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-2); }
  .smp { color: var(--color-fg-1); font-size: 22px; }
  .note { margin-top: 12px; font-size: 11px; color: var(--color-fg-3); line-height: 1.6; }
  .note code { font-family: var(--font-mono); color: var(--color-fg-2); }
</style></head>
<body><div class="wrap">
  <div class="row-w"><span class="tk">400 regular</span><span class="smp" style="font-weight: 400;">Differentiable routing</span></div>
  <div class="row-w"><span class="tk">500 medium</span><span class="smp" style="font-weight: 500;">Differentiable routing</span></div>
  <div class="row-w"><span class="tk">600 semibold</span><span class="smp" style="font-weight: 600;">Differentiable routing</span></div>
  <div class="row-w"><span class="tk">700 bold</span><span class="smp" style="font-weight: 700;">Differentiable routing</span></div>
  <p class="note">
    Tracking: <code>-0.02em</code> on display, <code>-0.01em</code> on h1/h2, <code>0.09em</code> uppercase on eyebrows.
    Line-height: <code>1.65</code> body, <code>1.40</code> headings, <code>1.0</code> the big domain count.
  </p>
</div></body></html>
