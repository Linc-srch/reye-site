<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .domain {
    background: rgba(22,22,35,0.62);
    border: 1px solid var(--color-border);
    border-radius: 18px;
    padding: 18px;
    backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    transition: all 0.2s;
  }
  .domain:hover { transform: translateY(-3px); border-color: var(--color-border-hover); }
  .count { font-size: 2.2rem; font-weight: 700; color: var(--color-accent); line-height: 1; margin-bottom: 0.4rem; }
  .name { font-size: 1rem; font-weight: 600; color: var(--color-fg-1); }
  .meta { color: var(--color-fg-2); font-size: 0.82rem; margin-top: 0.4rem; }
</style></head>
<body><div class="wrap">
  <div class="grid">
    <div class="domain">
      <div class="count">98</div>
      <div class="name">AI Safety</div>
      <div class="meta">2 today</div>
    </div>
    <div class="domain">
      <div class="count">79</div>
      <div class="name">System Safety</div>
      <div class="meta">1 today</div>
    </div>
    <div class="domain">
      <div class="count">50</div>
      <div class="name">Cryptography</div>
      <div class="meta">0 today</div>
    </div>
  </div>
</div></body></html>
