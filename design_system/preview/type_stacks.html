<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .block { margin-bottom: 14px; }
  .label { font-size: 10px; color: var(--color-fg-2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .sans-demo { font-family: var(--font-sans); font-size: 20px; color: var(--color-fg-1); font-weight: 500; }
  .mono-demo { font-family: var(--font-mono); font-size: 16px; color: var(--color-fg-1); }
  .stack { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); margin-top: 2px; line-height: 1.5; }
</style></head>
<body><div class="wrap">
  <div class="block">
    <div class="label">Sans · system stack</div>
    <div class="sans-demo">Reye · 数字信任研究之眼 · DashAttention</div>
    <div class="stack">-apple-system, "SF Pro Display", "SF Pro Text", system-ui, "Noto Sans SC", "PingFang SC"</div>
  </div>
  <div class="block">
    <div class="label">Mono · code &amp; identifiers</div>
    <div class="mono-demo">arxiv 2605.18753 · 75% sparsity · 3.36× speedup</div>
    <div class="stack">"SF Mono", "Fira Code", ui-monospace, "Cascadia Code", "Menlo"</div>
  </div>
</div></body></html>
