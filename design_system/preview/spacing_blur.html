<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; overflow: hidden; }
  body::before, body::after { display: none; }
  .stage {
    position: relative; width: 100%; height: 100%;
    background: #070710; padding: 24px 28px;
    overflow: hidden;
  }
  .stage::before {
    content: ''; position: absolute;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(80,110,255,0.5), transparent 68%);
    top: -180px; right: -120px;
  }
  .stage::after {
    content: ''; position: absolute;
    width: 360px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(160,90,255,0.42), transparent 65%);
    bottom: -140px; left: -100px;
  }
  .card-demo {
    position: relative; z-index: 2;
    background: rgba(22,22,35,0.62);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    padding: 16px 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    max-width: 460px;
  }
  .card-demo h3 { font-size: 14px; font-weight: 600; color: var(--color-fg-1); margin-bottom: 6px; }
  .card-demo p { font-size: 12px; color: var(--color-fg-2); line-height: 1.6; font-family: var(--font-mono); }
</style></head>
<body>
  <div class="stage">
    <div class="card-demo">
      <h3>backdrop-filter: blur(24px)</h3>
      <p>One constant blur radius across every surface — header, card, input.<br/>The orbs behind soften into uniform haze.</p>
    </div>
  </div>
</body></html>
