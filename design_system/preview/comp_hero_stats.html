<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .hero {
    text-align: center;
    background: linear-gradient(135deg, rgba(70,100,255,0.10) 0%, rgba(140,70,255,0.07) 100%);
    border: 1px solid var(--color-border);
    border-radius: 18px;
    padding: 22px 26px;
    backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
  }
  .hero p { font-size: 14px; color: var(--color-fg-2); }
  .hero strong { color: var(--color-fg-1); font-weight: 600; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); margin-top: 14px; text-align: center; }
</style></head>
<body><div class="wrap">
  <div class="hero">
    <p>Updated <strong>2026-05-21</strong> &nbsp;·&nbsp;
       <strong>107</strong> articles analysed &nbsp;·&nbsp;
       <strong>111</strong> total tracked</p>
  </div>
  <div class="lbl">.hero-stats — the only centred card on the homepage, only place the blue→violet gradient lands</div>
</div></body></html>
