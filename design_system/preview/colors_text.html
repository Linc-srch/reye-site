<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .spec { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: center; gap: 18px; }
  .swab { width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; border: 1px solid var(--color-border); }
  .demo { font-size: 16px; font-weight: 500; flex: 1; }
  .name { font-size: 12px; color: var(--color-fg-2); font-family: var(--font-mono); width: 80px; }
  .val  { font-size: 11px; color: var(--color-fg-3); font-family: var(--font-mono); }
</style></head>
<body><div class="wrap">
  <div class="spec">
    <div class="line">
      <div class="swab" style="background: #e8e8f0;"></div>
      <span class="name">fg-1</span>
      <span class="demo" style="color: #e8e8f0;">Primary — DashAttention proposes adaptive routing.</span>
      <span class="val">#e8e8f0</span>
    </div>
    <div class="line">
      <div class="swab" style="background: #8888a0;"></div>
      <span class="name">fg-2</span>
      <span class="demo" style="color: #8888a0;">Secondary — 2026-05-19 · arxiv · 4/5</span>
      <span class="val">#8888a0</span>
    </div>
    <div class="line">
      <div class="swab" style="background: #5a5a78;"></div>
      <span class="name">fg-3</span>
      <span class="demo" style="color: #5a5a78;">Tertiary — disabled, footnote, placeholder.</span>
      <span class="val">#5a5a78</span>
    </div>
    <div class="line">
      <div class="swab" style="background: #6d9eff;"></div>
      <span class="name">accent</span>
      <span class="demo" style="color: #6d9eff;">Accent — links, counts, active state.</span>
      <span class="val">#6d9eff</span>
    </div>
  </div>
</div></body></html>
