<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .pane {
    border: 1px solid var(--color-border);
    border-radius: 14px; padding: 16px;
    background: rgba(22,22,35,0.55);
  }
  .eyebrow {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--color-fg-2); margin-bottom: 6px;
  }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; color: var(--color-fg-1); line-height: 1.3; }
  .lang-pair { color: var(--color-fg-1); font-size: 14px; line-height: 1.6; }
  .lang-pair .zh { color: var(--color-fg-2); margin-top: 4px; }
</style></head>
<body><div class="wrap">
  <div class="row2">
    <div class="pane">
      <div class="eyebrow">Summary</div>
      <div class="title">DashAttention: Differentiable and Adaptive Sparse Hierarchical Attention</div>
    </div>
    <div class="pane">
      <div class="lang-pair">
        About this feed
        <div class="zh">关于此订阅</div>
      </div>
      <div class="lang-pair" style="margin-top: 12px;">
        Updated <strong>2026-05-21</strong>
        <div class="zh">最后更新 <strong style="color: var(--color-fg-1);">2026-05-21</strong></div>
      </div>
    </div>
  </div>
</div></body></html>
